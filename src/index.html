<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>StableDiffusionCppUI</title>
<link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<aside>
<div class="sidebar-header">
<div class="logo-placeholder">
<i data-lucide="image" style="width: 48px; height: 48px;"></i>
</div>
</div>
<nav>
<label class="config-label">Preajustes</label>
<div class="presets-section">
<div class="presets-load">
<select id="select-preset">
<option value="">— Seleccionar preajuste —</option>
</select>
<div class="presets-load-actions">
<button id="btn-load-preset" class="btn-secondary">Cargar</button>
<button id="btn-delete-preset" class="btn-danger">Eliminar</button>
</div>
</div>
<div class="presets-divider"></div>
<div class="presets-save">
<input id="input-preset-name" type="text" placeholder="Nombre del nuevo preajuste…" />
<button id="btn-save-preset" class="btn-secondary">Guardar</button>
</div>
</div>
</nav>
<div class="sidebar-footer">
<div class="config-group">
<label class="config-label">Ruta de Stable Diffusion cpp</label>
<div class="path-display" id="path-sdcpp" data-action="pick-sdcpp" style="cursor:pointer">
<i data-lucide="terminal" style="width: 14px; height: 14px;"></i>
<span id="path-sdcpp-text">No configurado</span>
</div>
</div>
<div class="config-group">
<label class="config-label">Ruta de salida</label>
<div class="path-display" id="path-output" data-action="pick-output" style="cursor:pointer">
<i data-lucide="hard-drive" style="width: 14px; height: 14px;"></i>
<span id="path-output-text">No configurado</span>
</div>
</div>
<div class="config-group">
<label class="config-label">Ruta de modelos</label>
<div class="path-display" id="path-models" data-action="pick-models" style="cursor:pointer">
<i data-lucide="folder" style="width: 14px; height: 14px;"></i>
<span id="path-models-text">No configurado</span>
</div>
</div>
<div class="config-group">
<label class="config-label">Ruta de VAE</label>
<div class="path-display" id="path-vae" data-action="pick-vae" style="cursor:pointer">
<i data-lucide="folder" style="width: 14px; height: 14px;"></i>
<span id="path-vae-text">No configurado</span>
</div>
</div>
<div class="config-group">
<label class="config-label">Ruta de LLM Encoder</label>
<div class="path-display" id="path-llm" data-action="pick-llm" style="cursor:pointer">
<i data-lucide="folder" style="width: 14px; height: 14px;"></i>
<span id="path-llm-text">No configurado</span>
</div>
</div>
<div class="config-group">
<label class="config-label">Ruta de LoRA</label>
<div class="path-display" id="path-lora" data-action="pick-lora" style="cursor:pointer">
<i data-lucide="folder" style="width: 14px; height: 14px;"></i>
<span id="path-lora-text">No configurado</span>
</div>
</div>
<div class="config-group">
<label class="config-label">Ruta de CLIP-L</label>
<div class="path-display" id="path-clip-l" data-action="pick-clip-l" style="cursor:pointer">
<i data-lucide="folder" style="width: 14px; height: 14px;"></i>
<span id="path-clip-l-text">No configurado</span>
</div>
</div>
<div class="config-group">
<label class="config-label">Ruta de CLIP-G</label>
<div class="path-display" id="path-clip-g" data-action="pick-clip-g" style="cursor:pointer">
<i data-lucide="folder" style="width: 14px; height: 14px;"></i>
<span id="path-clip-g-text">No configurado</span>
</div>
</div>
<div class="config-group">
<label class="config-label">Ruta de T5XXL</label>
<div class="path-display" id="path-t5xxl" data-action="pick-t5xxl" style="cursor:pointer">
<i data-lucide="folder" style="width: 14px; height: 14px;"></i>
<span id="path-t5xxl-text">No configurado</span>
</div>
</div>
</div>
</aside>
<main>
<header>
<div class="brand-box">
<span class="brand-name">StableDiffusionCppUI</span>
</div>
<div class="header-actions">
<button id="btn-refresh" class="refresh-btn"><i data-lucide="refresh-cw"></i> Actualizar recursos</button>
</div>
</header>
<div class="content-wrapper">
<!-- Model Selection -->
<div class="model-grid">
<div class="input-group">
<label class="input-label">Modelo</label>
<select id="select-model"><option value="">Ninguno</option></select>
</div>
<div class="input-group">
<label class="input-label">LLM Encoder</label>
<select id="select-llm"><option value="">Ninguno</option></select>
</div>
<div class="input-group">
<label class="input-label">VAE</label>
<select id="select-vae"><option value="">Ninguno</option></select>
</div>
<div class="input-group">
<label class="input-label">LoRA</label>
<select id="select-lora"><option value="">Ninguno</option></select>
</div>
<div class="input-group">
<label class="input-label">CLIP-L</label>
<select id="select-clip-l"><option value="">Ninguno</option></select>
</div>
<div class="input-group">
<label class="input-label">CLIP-G</label>
<select id="select-clip-g"><option value="">Ninguno</option></select>
</div>
<div class="input-group">
<label class="input-label">T5XXL</label>
<select id="select-t5xxl"><option value="">Ninguno</option></select>
</div>
</div>
<div class="workspace-grid">
<!-- Controls Column -->
<div class="controls-col">
<div class="model-type-row">
<span class="input-label">Modelo: <i data-lucide="circle-question-mark" class="help-icon"></i></span>
<label class="radio-label">
<input type="radio" name="model-type" value="diffusion" checked/>
<span>Difusión (--diffusion-model)</span>
</label>
<label class="radio-label">
<input type="radio" name="model-type" value="monolithic"/>
<span>Monolítico (-m)</span>
</label>
</div>
<div class="prompt-area">
<div class="prompt-header">
<label class="input-label">Prompt <i data-lucide="circle-question-mark" class="help-icon"></i></label>
</div>
<textarea id="input-prompt" placeholder="Introduce el texto descriptivo para la generación de imagen..."></textarea>
</div>
<div class="negative-prompt">
<div class="prompt-header">
<label class="input-label">Negative Prompt <i data-lucide="circle-question-mark" class="help-icon"></i></label>
</div>
<textarea id="input-negative" placeholder="Elementos a evitar..."></textarea>
</div>
<div class="params-card">
<div class="params-grid">
<div class="input-group">
<label class="input-label">Ancho <i data-lucide="circle-question-mark" class="help-icon"></i></label>
<input id="input-width" type="number" value="1024"/>
</div>
<div class="input-group">
<label class="input-label">Alto <i data-lucide="circle-question-mark" class="help-icon"></i></label>
<input id="input-height" type="number" value="1024"/>
</div>
<div class="input-group">
<label class="input-label">Steps <i data-lucide="circle-question-mark" class="help-icon"></i></label>
<input id="input-steps" type="number" value="30"/>
</div>
<div class="input-group">
<label class="input-label">CFG Scale <i data-lucide="circle-question-mark" class="help-icon"></i></label>
<input id="input-cfg" step="0.5" type="number" value="7.5"/>
</div>
<div class="input-group">
<label class="input-label">Guidance <i data-lucide="circle-question-mark" class="help-icon"></i></label>
<input id="input-guidance" step="0.1" type="number" value="3.5"/>
<p class="input-hint">Solo Flux / Qwen</p>
</div>
<div class="input-group">
<label class="input-label">Seed <i data-lucide="circle-question-mark" class="help-icon"></i></label>
<input id="input-seed" type="number" value="-1"/>
<p class="input-hint">-1 = aleatorio</p>
</div>
<div class="input-group">
<label class="input-label">Lote <i data-lucide="circle-question-mark" class="help-icon"></i></label>
<input id="input-batch-count" type="number" value="1" min="1" max="8"/>
</div>
<div class="input-group">
<label class="input-label">VRAM máx. <i data-lucide="circle-question-mark" class="help-icon"></i></label>
<input id="input-max-vram" step="0.1" type="number" value="-0.5"/>
<p class="input-hint">Negativo = auto</p>
</div>
<div class="input-group">
<label class="input-label">Peso LoRA <i data-lucide="circle-question-mark" class="help-icon"></i></label>
<input id="input-lora-weight" step="0.1" type="number" min="0" max="2" value="1" disabled/>
</div>
</div>
<div class="input-group">
<label class="input-label">Sampler <i data-lucide="circle-question-mark" class="help-icon"></i></label>
<select id="select-sampler"></select>
</div>
<div class="input-group">
<label class="input-label">Scheduler <i data-lucide="circle-question-mark" class="help-icon"></i></label>
<select id="select-scheduler"></select>
</div>
<div class="toggles-list">
<label class="toggle-row">
<span class="input-label">VAE en CPU <i data-lucide="circle-question-mark" class="help-icon"></i></span>
<div class="switch">
<input id="toggle-vae-cpu" checked="" type="checkbox"/>
<span class="slider"></span>
</div>
</label>
<label class="toggle-row">
<span class="input-label">CLIP en CPU <i data-lucide="circle-question-mark" class="help-icon"></i></span>
<div class="switch">
<input id="toggle-clip-cpu" type="checkbox"/>
<span class="slider"></span>
</div>
</label>
<label class="toggle-row">
<span class="input-label">Descargar a CPU <i data-lucide="circle-question-mark" class="help-icon"></i></span>
<div class="switch">
<input id="toggle-offload-cpu" type="checkbox"/>
<span class="slider"></span>
</div>
</label>
<label class="toggle-row">
<span class="input-label">Diffusion Flash Attn <i data-lucide="circle-question-mark" class="help-icon"></i></span>
<div class="switch">
<input id="toggle-diffusion-fa" checked="" type="checkbox"/>
<span class="slider"></span>
</div>
</label>
<label class="toggle-row">
<span class="input-label">VAE Tiling <i data-lucide="circle-question-mark" class="help-icon"></i></span>
<div class="switch">
<input id="toggle-vae-tiling" type="checkbox"/>
<span class="slider"></span>
</div>
</label>
<label class="toggle-row">
<span class="input-label">Verbose <i data-lucide="circle-question-mark" class="help-icon"></i></span>
<div class="switch">
<input id="toggle-verbose" type="checkbox"/>
<span class="slider"></span>
</div>
</label>
</div>
</div>
<details class="custom-flags-section">
<summary><i data-lucide="chevron-right" class="details-chevron"></i><span class="input-label">Parámetros y flags personalizados <i data-lucide="circle-question-mark" class="help-icon"></i></span></summary>
<textarea id="input-custom-flags" rows="4" placeholder="--parametro valor&#10;--flag&#10;--parametro2 valor"></textarea>
</details>
<div class="run-row">
<button id="btn-copy" class="btn-outline" title="Copiar comando">
<i data-lucide="copy"></i>
</button>
<button id="btn-run" class="run-btn">
<i data-lucide="play"></i>
EJECUTAR
</button>
<button id="btn-abort" class="btn-abort" title="Cancelar" hidden>
<i data-lucide="x"></i>
</button>
</div>
</div>
<!-- Preview Column -->
<div class="preview-col">
<div class="canvas-area">
<div class="canvas-placeholder" id="canvas-placeholder">
<i data-lucide="image" style="width: 64px; height: 64px;"></i>
<p>Vista previa de salida</p>
</div>
<img id="preview-img" />
<div id="preview-gallery" class="preview-gallery"></div>
</div>
<div class="actions-bar" id="actions-bar">
<button id="btn-copy-seed" class="btn-outline" title="Copiar semilla" disabled><i data-lucide="copy"></i> Copiar semilla</button>
<button id="btn-copy-console" class="btn-outline" title="Copiar salida de la consola" disabled><i data-lucide="copy"></i> Copiar salida de la consola</button>
<button id="btn-open-output" class="btn-outline" title="Abrir carpeta de salida"><i data-lucide="folder-open"></i> Abrir carpeta de salida</button>
</div>
<pre id="console-output" class="console-area"></pre>
</div>
</div>
</div>
</main>
<script type="module" src="js/main.js"></script>
</body></html>
